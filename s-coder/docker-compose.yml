version: '3.8'

x-podman:
  in_pod: false

services:
  tailscale:
    image: tailscale/tailscale:latest
    env_file:
      - /home/administrator/.homelab/env
    security_opt:
      - label=type:homelab_tailscale_container.process
    hostname: coder
    volumes:
      - tailscale_data:/var/lib/tailscale:Z
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      # The command to run inside the container.
      # The `-q` flag on the second grep makes it "quiet", so it doesn't
      # print output, it just exits with 0 (success) if "Running" is found,
      # and 1 (failure) otherwise.
      test: ["CMD-SHELL", "tailscale status --json | grep BackendState | grep -q Running"]
      # How often to run the check.
      interval: 10s
      # How long to wait for the check to return.
      timeout: 5s
      # How many times to retry before marking as unhealthy.
      retries: 3
      # Grace period for the container to start before the first check.
      start_period: 10s
    # Required capabilities for Tailscale to manage network interfaces.
    ports:
      - 51822:51822/udp
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    expose:
      - 7080
    network_mode: "pasta"
  
  coder:
    build:
      context: /home/administrator
      dockerfile: homelab/images/coder/Containerfile
    env_file:
      - /home/administrator/.homelab/env
    security_opt:
      - label=type:homelab_coder_container.process
    volumes:
      - coder_home:/home/coder:Z
      - ${XDG_RUNTIME_DIR}/libvirt/:/run/user/1000/libvirt/:z
    group_add:
      - "keep-groups"
    restart: always
    depends_on:
      database:
        condition: service_healthy
    userns_mode: "keep-id"
    user: "1000:1000" 
    expose:
      - 7080
      - 5432
    network_mode: "service:tailscale"

  # PostgreSQL database for Coder.
  database:
    image: "postgres:16"
    env_file:
      - /home/administrator/.homelab/env
    security_opt:
      - label=type:homelab_database_container.process
    volumes:
      - coder_data:/var/lib/postgresql/data:Z
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-username} -d ${POSTGRES_DB:-coder}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    expose:
      - 5432
    network_mode: "service:tailscale"

volumes:
  coder_data:
  coder_home:
  tailscale_data: