name: Trigger Update & Reload of the Homelab Updater Service

on:
  push:
    branches:
      - main
    paths:
      - 'control-plane/**'
      - 's-coder/**'
      - 's-homelab-updater/**'
  workflow_dispatch:

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            control_plane:
              - 'control-plane/**'
            s_coder:
              - 's-coder/**'
            s_homelab_updater:
              - 's-homelab-updater/**'

      - name: Tailscale
        if: steps.changes.outputs.control_plane == 'true' || steps.changes.outputs.s_coder == 'true'
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci,tag:ci-update-homelab
          ping: homelab-update-service
    
      - name: Remove Tailscale DNS
        if: steps.changes.outputs.control_plane == 'true' || steps.changes.outputs.s_coder == 'true'
        run: |
          sudo tailscale set --accept-dns=false
        
      - name: Trigger reload of the Control Plane
        if: steps.changes.outputs.control_plane == 'true'
        run: |
          curl -fsS -X GET http://100.114.186.102:2345/update/homelab_control_plane

      - name: Trigger reload of the Coder Service
        if: steps.changes.outputs.s_coder == 'true'
        run: |
          curl -fsS -X GET http://100.114.186.102:2345/update/s-coder
      
      - name: Trigger reload of the Homelab Updater Service
        if: steps.changes.outputs.s_homelab_updater == 'true'
        run: |
          curl -fsS --max-time 5 -X GET http://100.114.186.102:2345/update || echo "Updater peer did not respond (expected during reset); continuing."